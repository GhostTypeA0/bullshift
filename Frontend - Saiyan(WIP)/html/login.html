<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>bullshift user login/creation</title>
    <link rel="stylesheet" href="../styles/login-style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="container">
        <!-- button toggler -->
        <div class="toggle-buttons">
          <button id="showCreate">Create User</button>
          <button id="showLogin">Login</button>
        </div>

        <!-- user creation card -->
        <form id="createForm" style="display: none">
          <h2>Create User</h2>
          <input type="text" id="username" placeholder="Username" required />
          <input type="email" id="email" placeholder="Email" />
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <!-- show password -->
            <input
              type="checkbox"
              onclick="password.type = this.checked ? 'text' : 'password'"
            />
          </div>
          <button type="submit">Create User</button>
          <p id="createMessage"></p>
        </form>

        <!-- login card -->
        <form id="loginForm">
          <h2>User Login</h2>
          <input type="text" id="loginUsername" placeholder="Username" required />
          <div class="password-wrapper">
            <input
              type="password"
              id="loginPassword"
              placeholder="Password"
              required
            />
            <input
              type="checkbox"
              onclick="loginPassword.type = this.checked ? 'text' : 'password'"
            />
          </div>
          <button type="submit">Login</button>
          <p id="loginMessage"></p>
        </form>
      </div>

      <div class="divider"></div>

      <div class="right-panel">
        <img src="../assets/logo.svg" alt="Bull-Shift Logo" class="logo" />
        <h1>Bull-Shift Messenger</h1>
        <p class="tagline">Spread Some Bull-Shift.</p>
      </div>
    </div>
    </div>
    <script src="../scripts/login-script.js"></script>
  </body>
</html>
