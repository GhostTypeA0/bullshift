<!doctype html>
<html>
<head>
    <title>Posts Test</title>
    <link rel="stylesheet" href="posts-styles.css" />
</head>
<body>
    <div class="container">
        <!-- button for display the overlay -->
        <button id="openPostModel" onclick="toggleModel(true)">Create New Post</button>
    </div>

    <!-- create a post overlay/model. this is hidden by default -->
    <div id="postModel" class="model">
        <div class="model-content">
            <span class="close" onclick="toggleModel(false)">&times;</span>
            <form id="createpost">
                <h2>Create A Post</h2>
                <input type="file" id="imageInput" accept="image/*,video/*" />
                <textarea id="caption" placeholder="Write a caption..."></textarea>
                <button type="button" onclick="addPost()">Post</button>
                <button type="button" id="logoutButton" onclick="logoutUser()">Logout</button>
            </form>
        </div>
    </div>

    <!-- feed area -->
    <div id="feed"></div>

    <!-- adds icon library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="posts-script.js"></script>
</body>
</html>
