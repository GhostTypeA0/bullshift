<!doctype html>
<html>
  <head>
    <title>Posts Test</title>
    <link rel="stylesheet" href="../styles/posts-styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- create post area -->
      <form id="createpost">
        <h2>Create A Post</h2>
        <!-- media input container with button based file selection image -->
        <div id=mediaInput>
          <input type="file" id="imageInput" accept="image/*video" hidden />
          <button id="imageButton">
            <img src="../assets/upload.svg" alt="+" id="uploadButton">
          </button>
        <textarea id="caption" placeholder="Write a caption..."></textarea>
        </div>
        <button onclick="addPost()">Post</button>
      </form>
    </div>

    <!-- feed area -->
    <div id="feed"></div>

    <!-- adds icon library -->
     <!-- please replace this with an actual icon -->

      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

  </body>
</html>
