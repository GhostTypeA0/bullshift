<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>bullshift user login/creation</title>
    <link rel="stylesheet" href="../stylesheets/login-style.css" />
  </head>
  <body>

  <script>

  </script>


    <div class="container">
      <!-- button toggler -->
      <div class="toggle-buttons">
        <button id="showCreate">Create User</button>
        <button id="showLogin">Login</button>
      </div>

      <!-- user creation card -->
      <form id="createForm">
        <h2>Create User</h2>
        <input type="text" id="username" placeholder="Username" required />
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Create User</button>
        <p id="createMessage"></p>
      </form>

      <!-- login card -->
      <form id="loginForm" style="display: none">
        <h2>User Login</h2>
        <input type="text" id="loginUsername" placeholder="Username" required />
        <input
          type="password"
          id="loginPassword"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
        <p id="loginMessage"></p>
      </form>    </div>

    <!-- users table to see created users go into local storage -->
    <!-- THIS WILL MOVE TO THE DB ONCE IMPLEMENTED -->
    <!-- WE DON'T WANT A TABLE ON THE FRONT END WITH REAL USER INFORMATION -->
    <h2>Users</h2>
    <table id="usersTable">
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Password</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="../scripts/login.js"></script>
  </body>
</html>
